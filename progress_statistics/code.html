<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Overall Stats | Peak Performance</title>

<style>

        }
        .chart-glow {
            filter: drop-shadow(0 0 8px rgba(87, 241, 219, 0.3));
        }
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#000767",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#62fae3",
                        "on-surface": "#dae2fd",
                        "on-primary-fixed": "#00201c",
                        "primary": "#57f1db",
                        "on-secondary-fixed": "#400010",
                        "surface-container-high": "#222a3d",

<body class="bg-background text-on-background min-h-screen font-body-md overflow-x-hidden">
<!-- Top AppBar -->
<header class="fixed top-0 z-50 w-full bg-background dark:bg-background flex justify-between items-center px-margin-mobile py-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:opacity-80 active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-background">Overall stat</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:opacity-80 active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 pb-24 px-margin-mobile space-y-xl">
<!-- Weight Stats Header -->
<section class="space-y-sm">
<div class="flex justify-between items-end">
<div class="space-y-xs">
<span class="font-label-sm text-label-sm text-outline uppercase">Current Weight</span>
<h2 class="font-display-lg text-display-lg text-primary tracking-tight">75,3 <span class="text-headline-md font-medium text-on-surface-variant">kg</span></h2>
</div>
<div class="flex items-center gap-base bg-surface-container-high px-md py-sm rounded-xl border border-outline-variant/10 cursor-pointer hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="font-label-md text-label-md text-on-surface">Weekly</span>
<span class="material-symbols-outlined text-outline text-sm">expand_more</span>
</div>
</div>
</section>
<!-- Bar Chart Visualization -->
<section class="relative">
<div class="glass-card rounded-2xl p-md h-64 flex items-end justify-between gap-sm">
<!-- Jan -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group">
<div class="w-full bg-surface-container-highest rounded-full h-[60%] group-hover:bg-outline-variant/40 transition-colors"></div>
<span class="font-label-sm text-label-sm text-outline">Jan</span>
</div>
<!-- Feb -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group">
<div class="w-full bg-surface-container-highest rounded-full h-[45%] group-hover:bg-outline-variant/40 transition-colors"></div>
<span class="font-label-sm text-label-sm text-outline">Feb</span>
</div>
<!-- Mar (Highlighted) -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group relative">
<div class="absolute -top-10 bg-primary text-on-primary px-sm py-xs rounded-lg font-label-sm text-[10px] chart-glow z-10">3.2%</div>
<div class="w-full bg-primary rounded-full h-[85%] chart-glow shadow-[0_0_20px_rgba(87,241,219,0.2)]"></div>
<span class="font-label-sm text-label-sm text-primary font-bold">Mar</span>
</div>
<!-- Apr -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group">
<div class="w-full bg-surface-container-highest rounded-full h-[55%] group-hover:bg-outline-variant/40 transition-colors"></div>
<span class="font-label-sm text-label-sm text-outline">Apr</span>
</div>
<!-- Mei -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group">
<div class="w-full bg-surface-container-highest rounded-full h-[70%] group-hover:bg-outline-variant/40 transition-colors"></div>
<span class="font-label-sm text-label-sm text-outline">Mei</span>
</div>
<!-- Jun -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group">
<div class="w-full bg-surface-container-highest rounded-full h-[40%] group-hover:bg-outline-variant/40 transition-colors"></div>
<span class="font-label-sm text-label-sm text-outline">Jun</span>
</div>
<!-- Jul -->
<div class="flex-1 flex flex-col items-center gap-sm h-full group">
<div class="w-full bg-surface-container-highest rounded-full h-[65%] group-hover:bg-outline-variant/40 transition-colors"></div>
<span class="font-label-sm text-label-sm text-outline">Jul</span>
</div>
</div>
</section>
<!-- Workout Goals -->
<section class="space-y-md">
<div class="flex justify-between items-center">
<h3 class="font-headline-md text-headline-md text-on-surface">Workout Goals</h3>
<button class="flex items-center gap-xs font-label-md text-label-md text-outline hover:text-primary transition-colors">
                    See more <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
<div class="space-y-md">
<!-- Goal Item 1 -->
<div class="glass-card rounded-2xl p-md flex items-center justify-between group hover:border-primary/20 transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-secondary-container/40 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div class="flex flex-col">
<span class="font-body-md font-bold text-on-surface">Arm & shoulder muscle</span>
<span class="font-label-sm text-label-sm text-outline">15 Exercise</span>
</div>
</div>
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="79.1" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute font-label-sm text-[10px] text-on-surface">37%</span>
</div>
</div>
<!-- Goal Item 2 -->
<div class="glass-card rounded-2xl p-md flex items-center justify-between group hover:border-primary/20 transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">front_hand</span>
</div>
<div class="flex flex-col">
<span class="font-body-md font-bold text-on-surface">Hand grip muscle</span>
<span class="font-label-sm text-label-sm text-outline">10 Exercise</span>
</div>
</div>
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="21.3" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute font-label-sm text-[10px] text-on-surface">83%</span>
</div>
</div>
<!-- Goal Item 3 -->
<div class="glass-card rounded-2xl p-md flex items-center justify-between group hover:border-primary/20 transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
<div class="flex flex-col">
<span class="font-body-md font-bold text-on-surface">Leg muscle</span>
<span class="font-label-sm text-label-sm text-outline">10 Exercise</span>
</div>
</div>
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="21.3" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute font-label-sm text-[10px] text-on-surface">83%</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-16 px-4 pb-safe bg-surface-container/70 dark:bg-surface-container/70 backdrop-blur-xl rounded-t-xl z-50 border-t border-outline-variant/10 shadow-lg">
<a class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-primary-fixed-dim transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-primary-fixed-dim transition-colors" href="#">
<span class="material-symbols-outlined">explore</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1 Active: scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">monitoring</span>
</a>
<a class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-primary-fixed-dim transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</nav>
<script>
        // Simple micro-interaction for the monthly bars
        const bars = document.querySelectorAll('.group div[class*="bg-surface-container-highest"]');
        bars.forEach(bar => {
            bar.addEventListener('click', () => {
                // Reset all
                document.querySelectorAll('.group div').forEach(b => {
                    b.classList.remove('bg-primary', 'chart-glow', 'shadow-[0_0_20px_rgba(87,241,219,0.2)]');
                    b.classList.add('bg-surface-container-highest');
                });
                document.querySelectorAll('.group span').forEach(s => s.classList.replace('text-primary', 'text-outline'));
                
                // Highlight selected
                bar.classList.remove('bg-surface-container-highest');
                bar.classList.add('bg-primary', 'chart-glow', 'shadow-[0_0_20px_rgba(87,241,219,0.2)]');
                bar.nextElementSibling.classList.replace('text-outline', 'text-primary');
            });
        });
    </script>
</body></html>
